schema_version: "1.0.0"
goal:
  id: "main"
  title: "Maintain reliable project coordination across multiple Codex threads"
  status: "active"
  owner: "project"
  created_at: "2026-05-16T06:39:20+09:00"
  summary: "All threads coordinate through shared dashboard state, write structured reports, and leave clear next steps."
success_criteria:
  - "Every thread reads shared state before making changes."
  - "Every thread creates a unique run report after working."
  - "Every thread creates a unique thread summary after working."
  - "Dashboard files show completed work, remaining work, blockers, changed files, verification, and next recommended prompts."
  - "No work is marked done unless verification is recorded."
  - "No secrets are stored in dashboard files."
workstreams:
  - id: "protocol-setup"
    title: "Initialize protocol and required file structure"
    status: "verified"
    verification:
      - "Required directories and files were created."
      - "Starter content was added to all files."
      - "Run report and thread summary were created for setup."
  - id: "project-context"
    title: "Fill in project-specific context"
    status: "not_started"
    next_step: "Replace starter brief and architecture notes with product-specific details."
  - id: "dashboard-visualization"
    title: "Visualize dashboard state"
    status: "done"
    verification:
      - "Next.js dashboard app reads current-status.json, project.yaml, goals/main.yaml, runs/*.json, and reports/latest.md."
      - "Dashboard displays status, current focus, completed count, remaining work, blockers, recent runs, latest report, and parser warnings."
      - "npm run typecheck and npm run build passed."
    next_step: "Add fixture-based parser tests and sync-safety enforcement before cloud sync work."
remaining_questions:
  - "What product or codebase should this coordination protocol support next?"
  - "Should dashboard reports also be consumed by a CLI summary?"
